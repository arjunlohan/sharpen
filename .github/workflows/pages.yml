name: Deploy showcase to GitHub Pages

# Publishes the static showcase/ folder to GitHub Pages on every push to main.
# The site root is showcase/index.html, so the live URL is:
#   https://arjunlohan.github.io/sharpen/
on:
  push:
    branches: [main]
    paths:
      - 'showcase/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least-privilege permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer run supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload showcase as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: showcase

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
